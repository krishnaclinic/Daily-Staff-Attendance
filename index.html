<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro-Attend | Smart Attendance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js" async defer></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 min-h-screen pb-10">
    <!-- Navbar -->
    <nav class="bg-indigo-700 text-white p-4 shadow-md sticky top-0 z-40">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold">Pro-Attend</h1>
            <div id="user-badge" class="hidden flex items-center gap-2 bg-indigo-800 px-3 py-1 rounded-full text-xs">
                <span id="user-display-name">...</span>
                <div class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></div>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-4 max-w-lg">
        
        <!-- 1. LOGIN SECTION -->
        <section id="login-view" class="mt-20">
            <div class="bg-white p-8 rounded-3xl shadow-xl text-center">
                <div class="w-20 h-20 bg-indigo-100 rounded-2xl flex items-center justify-center mx-auto mb-6">
                    <svg class="w-10 h-10 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-2.04l.054-.09A10.003 10.003 0 0120 20m-10.982-9.848a4.459 4.459 0 118.19 0m-5.384 1.258a3.352 3.352 0 10-4.013-4.013"></path></svg>
                </div>
                <h2 class="text-2xl font-black text-slate-800 mb-2">Smart Attendance</h2>
                <p class="text-slate-500 mb-8 text-sm">Secure, Location-Verified Check-in</p>
                <button id="login-btn" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold shadow-lg">Sign in with Google</button>
            </div>
        </section>

        <!-- 2. OWNER/ADMIN VIEW -->
        <section id="admin-view" class="hidden space-y-6">
            <div id="setup-card" class="hidden bg-orange-50 p-6 rounded-3xl border-2 border-dashed border-orange-200">
                <h3 class="font-bold text-orange-800 mb-2">Sheet Structure Not Found</h3>
                <button onclick="initializeSheetStructure()" class="bg-orange-600 text-white px-4 py-2 rounded-xl text-sm font-bold">Build Database Structure</button>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                    <p class="text-slate-400 text-xs font-bold uppercase">Today's Presence</p>
                    <p id="count-present" class="text-2xl font-black">0</p>
                </div>
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                    <p class="text-slate-400 text-xs font-bold uppercase">Total Staff</p>
                    <p id="count-staff" class="text-2xl font-black">0</p>
                </div>
            </div>

            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                <h3 class="font-bold mb-4">Register Store</h3>
                <div class="space-y-3">
                    <input id="adm-store-name" type="text" placeholder="Store Name" class="w-full bg-slate-50 p-3 rounded-xl outline-indigo-500">
                    <div class="flex gap-2">
                        <input id="adm-store-lat" type="text" placeholder="Lat" class="w-1/2 bg-slate-50 p-3 rounded-xl outline-indigo-500 text-sm">
                        <input id="adm-store-lng" type="text" placeholder="Long" class="w-1/2 bg-slate-50 p-3 rounded-xl outline-indigo-500 text-sm">
                    </div>
                    <button onclick="registerStore()" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold">Add Store</button>
                </div>
            </div>

            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                <h3 class="font-bold mb-4">Register Employee</h3>
                <div class="space-y-3">
                    <input id="adm-emp-email" type="email" placeholder="Google Email" class="w-full bg-slate-50 p-3 rounded-xl outline-indigo-500">
                    <input id="adm-emp-name" type="text" placeholder="Full Name" class="w-full bg-slate-50 p-3 rounded-xl outline-indigo-500">
                    <select id="adm-emp-store" class="w-full bg-slate-50 p-3 rounded-xl outline-indigo-500"></select>
                    <button onclick="registerEmployee()" class="w-full bg-slate-900 text-white py-3 rounded-xl font-bold">Add Staff</button>
                </div>
            </div>
        </section>

        <!-- 3. EMPLOYEE VIEW -->
        <section id="staff-view" class="hidden space-y-6">
            <div class="bg-white p-6 rounded-3xl shadow-xl border border-slate-100 text-center">
                <div class="mb-6">
                    <h2 id="staff-welcome" class="text-2xl font-black text-slate-800">Hello!</h2>
                    <p id="staff-store-tag" class="text-indigo-600 font-bold text-sm uppercase mt-1">...</p>
                </div>

                <div id="attendance-box">
                    <div id="camera-container" class="relative bg-slate-900 rounded-3xl overflow-hidden mb-6 aspect-square">
                        <video id="video" autoplay playsinline class="w-full h-full object-cover"></video>
                        <canvas id="canvas" class="hidden"></canvas>
                        <img id="photo-preview" class="hidden absolute inset-0 w-full h-full object-cover">
                        <div class="absolute bottom-4 left-0 right-0 flex justify-center">
                            <button id="capture-btn" class="bg-white/20 backdrop-blur-md p-4 rounded-full text-white border border-white/30">
                                <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4 5a2 2 0 00-2 2v8a2 2 0 002 2h12a2 2 0 002-2V7a2 2 0 00-2-2h-1.586a1 1 0 01-.707-.293l-1.121-1.121A2 2 0 0011.172 3H8.828a2 2 0 00-1.414.586L6.293 4.707A1 1 0 015.586 5H4zm6 9a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd"></path></svg>
                            </button>
                        </div>
                    </div>

                    <div id="punch-controls" class="space-y-3">
                        <div id="status-display" class="bg-slate-50 p-4 rounded-2xl mb-4 text-sm font-medium text-slate-500">
                            Take a selfie to verify location...
                        </div>
                        <div class="flex gap-4">
                            <button id="punch-in-btn" disabled class="flex-1 bg-emerald-500 text-white py-5 rounded-2xl font-black opacity-50 shadow-lg shadow-emerald-100">PUNCH IN</button>
                            <button id="punch-out-btn" disabled class="flex-1 bg-rose-500 text-white py-5 rounded-2xl font-black opacity-50 shadow-lg shadow-rose-100">PUNCH OUT</button>
                        </div>
                    </div>

                    <div id="completed-msg" class="hidden bg-emerald-50 p-8 rounded-3xl border-2 border-emerald-100">
                        <div class="text-emerald-500 text-5xl mb-4">✅</div>
                        <h3 class="text-xl font-bold text-emerald-800">Done for Today!</h3>
                        <p class="text-emerald-600 text-sm mt-2">Attendance logged successfully.</p>
                    </div>
                </div>
            </div>
            
            <!-- Offline Queue Sync Button -->
            <button id="sync-btn" onclick="syncOfflineData()" class="hidden w-full bg-orange-500 text-white py-4 rounded-2xl font-bold shadow-lg">⚠️ Sync Offline Entries</button>
        </section>

    </main>

    <div id="loader" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50">
        <div class="bg-white p-6 rounded-3xl shadow-2xl flex flex-col items-center">
            <div class="spinner border-4 border-indigo-600 border-t-transparent w-10 h-10 rounded-full animate-spin"></div>
            <p class="mt-4 font-bold text-slate-700">Connecting...</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
