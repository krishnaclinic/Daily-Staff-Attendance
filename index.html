<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro-Attend | Professional Geofencing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .loading-overlay { display: none; background: rgba(255,255,255,0.98); z-index: 9999; position: fixed; inset: 0; }
        .loading-overlay.active { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #video-preview, #captured-photo { transform: scaleX(-1); border-radius: 1.5rem; border: 4px solid white; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .tab-btn.active { border-bottom: 3px solid #4338ca; color: #4338ca; }
        .locked-screen { display: none; position: fixed; inset: 0; background: white; z-index: 10000; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2rem; }
        canvas { display: none; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">

    <div id="loader" class="loading-overlay">
        <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-indigo-700 mb-4"></div>
        <p id="loader-msg" class="font-bold text-indigo-700 uppercase tracking-tighter text-[10px]">Processing...</p>
    </div>

    <!-- Lockout Screen -->
    <div id="lockout-screen" class="locked-screen">
        <i class="fas fa-user-lock text-rose-500 text-5xl mb-4"></i>
        <h2 class="text-xl font-black">Access Denied</h2>
        <p class="text-slate-500 text-sm max-w-xs mb-8">Unauthorized user. Contact your store manager.</p>
        <button onclick="logout()" class="bg-slate-900 text-white px-8 py-3 rounded-2xl font-bold">Sign Out</button>
    </div>

    <!-- Header -->
    <header class="bg-indigo-700 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 onclick="goHome()" class="text-xl font-black italic cursor-pointer flex items-center gap-2">
                <i class="fas fa-shield-halved"></i> PRO-ATTEND
            </h1>
            <div class="flex gap-2">
                <button id="admin-toggle-btn" onclick="enterAdminMode()" class="hidden bg-white/20 px-4 py-2 rounded-xl text-xs font-bold hover:bg-white/30 transition">ADMIN</button>
                <button id="logout-btn" onclick="logout()" class="hidden bg-rose-600 px-4 py-2 rounded-xl text-xs font-bold">LOGOUT</button>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4">
        
        <!-- View: Auth -->
        <section id="view-auth" class="mt-20 text-center">
            <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl max-w-sm mx-auto border border-slate-100">
                <i class="fas fa-fingerprint text-4xl text-indigo-600 mb-6"></i>
                <h2 class="text-2xl font-black mb-10">Welcome Back</h2>
                <div id="google-login-container" class="flex justify-center"></div>
            </div>
        </section>

        <!-- View: Attendance -->
        <section id="view-attendance" class="hidden space-y-6">
            <div class="bg-white p-6 rounded-3xl shadow-lg border-l-8 border-indigo-600">
                <h2 id="shift-status" class="text-2xl font-black text-slate-800 tracking-tight italic">System Ready</h2>
                <p id="user-display-name" class="text-slate-400 text-sm font-medium mt-1">Hello User</p>
            </div>

            <div class="bg-white p-8 rounded-[2.5rem] shadow-xl space-y-6 text-center border border-slate-100">
                <div class="relative overflow-hidden bg-slate-100 rounded-3xl aspect-square max-w-[300px] mx-auto border-4 border-white shadow-inner flex items-center justify-center">
                    <video id="video-preview" autoplay playsinline class="w-full h-full object-cover hidden"></video>
                    <img id="captured-photo" class="w-full h-full object-cover hidden" />
                    <div id="camera-placeholder" class="text-slate-300">
                        <i class="fas fa-camera text-5xl opacity-20"></i>
                    </div>
                    <div class="absolute bottom-6 left-0 right-0 flex justify-center gap-3">
                        <button onclick="startCamera()" id="start-camera-btn" class="bg-indigo-600 text-white px-6 py-3 rounded-2xl text-xs font-black shadow-xl">START CAMERA</button>
                        <button onclick="capturePhoto()" id="capture-btn" class="hidden bg-emerald-500 text-white px-6 py-3 rounded-2xl text-xs font-black shadow-xl">SNAP SELFIE</button>
                    </div>
                </div>

                <div id="location-card" class="bg-slate-50 p-4 rounded-2xl border-2 border-dashed border-slate-200">
                    <div id="location-status" class="text-[10px] font-black text-slate-400 uppercase tracking-widest flex items-center justify-center gap-2">
                        <i class="fas fa-location-dot" id="gps-icon"></i>
                        <span id="location-text">Waiting for Location Permission...</span>
                    </div>
                    <div id="distance-info" class="text-xs font-bold text-indigo-600 mt-1 hidden"></div>
                </div>

                <!-- Error Message Display -->
                <div id="punch-error" class="hidden text-rose-600 text-xs font-black uppercase p-2 bg-rose-50 rounded-lg border border-rose-100"></div>

                <div class="grid grid-cols-2 gap-4">
                    <button id="btn-punch-in" disabled onclick="handlePunch('IN')" class="bg-emerald-500 disabled:bg-slate-200 text-white py-6 rounded-3xl font-black text-xl shadow-lg transition-all">IN</button>
                    <button id="btn-punch-out" disabled onclick="handlePunch('OUT')" class="bg-rose-600 disabled:bg-slate-200 text-white py-6 rounded-3xl font-black text-xl shadow-lg transition-all">OUT</button>
                </div>
            </div>
        </section>

        <!-- View: Admin Panel -->
        <section id="view-admin" class="hidden space-y-6 pb-20">
            <div class="flex border-b border-slate-200 overflow-x-auto gap-4 no-scrollbar">
                <button onclick="setAdminTab('dash')" class="tab-btn px-4 py-3 font-black text-[10px] active uppercase tracking-widest" id="tab-dash">Dashboard</button>
                <button onclick="setAdminTab('staff')" class="tab-btn px-4 py-3 font-black text-[10px] uppercase tracking-widest" id="tab-staff">Staff</button>
                <button onclick="setAdminTab('stores')" class="tab-btn px-4 py-3 font-black text-[10px] uppercase tracking-widest" id="tab-stores">Stores</button>
            </div>

            <!-- Tab: Manage Staff -->
            <div id="admin-staff" class="hidden space-y-6">
                <form id="form-employee" class="bg-white p-6 rounded-3xl shadow-md space-y-4 border border-slate-100">
                    <h3 id="staff-form-title" class="font-black text-sm">Register New Staff</h3>
                    <input type="hidden" id="staff-row-idx">
                    <input type="email" id="emp-email" placeholder="Google Email" class="w-full border p-4 rounded-2xl bg-slate-50 outline-none" required>
                    <input type="text" id="emp-name" placeholder="Full Name" class="w-full border p-4 rounded-2xl bg-slate-50 outline-none" required>
                    <select id="emp-store-select" class="w-full border p-4 rounded-2xl bg-slate-50 outline-none" required></select>
                    <div class="flex gap-2">
                        <button type="submit" id="staff-save-btn" class="flex-1 bg-emerald-600 text-white p-4 rounded-2xl font-black shadow-md">SAVE STAFF</button>
                        <button type="button" id="staff-cancel-btn" onclick="resetStaffForm()" class="hidden bg-slate-200 text-slate-600 p-4 rounded-2xl font-black">CANCEL</button>
                    </div>
                </form>
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                    <select id="manage-staff-filter" onchange="renderStaffList()" class="w-full p-2 font-bold bg-transparent outline-none">
                        <option value="all">Display All Personnel</option>
                    </select>
                </div>
                <div id="staff-list" class="space-y-2"></div>
            </div>

            <!-- Tab: Manage Stores -->
            <div id="admin-stores" class="hidden space-y-6">
                <form id="form-store" class="bg-white p-6 rounded-3xl shadow-md space-y-4 border border-slate-100">
                    <h3 id="store-form-title" class="font-black text-sm">Add New Store</h3>
                    <input type="hidden" id="store-row-idx">
                    <input type="text" id="store-name" placeholder="Store Name" class="w-full border p-4 rounded-2xl bg-slate-50 outline-none" required>
                    <div class="grid grid-cols-2 gap-3">
                        <input type="text" id="store-lat" placeholder="Latitude" class="border p-4 rounded-2xl bg-slate-50 outline-none">
                        <input type="text" id="store-lng" placeholder="Longitude" class="border p-4 rounded-2xl bg-slate-50 outline-none">
                        <input type="number" id="store-range" placeholder="Range (meters)" class="col-span-2 border p-4 rounded-2xl bg-slate-50 outline-none" value="150" required>
                    </div>
                    <div class="flex gap-2">
                        <button type="submit" id="store-save-btn" class="flex-1 bg-slate-900 text-white p-4 rounded-2xl font-black shadow-md">SAVE STORE</button>
                        <button type="button" id="store-cancel-btn" onclick="resetStoreForm()" class="hidden bg-slate-200 text-slate-600 p-4 rounded-2xl font-black">CANCEL</button>
                    </div>
                </form>
                <div id="stores-list" class="space-y-2"></div>
            </div>

            <!-- Dashboard Tab (Simplified Placeholder) -->
            <div id="admin-dash" class="space-y-4">
                <div id="report-results" class="space-y-2"></div>
            </div>
        </section>
    </main>

    <div id="toast" class="toast bg-slate-900 text-white px-8 py-5 rounded-[2rem] shadow-2xl flex flex-col min-w-[320px]">
        <span id="toast-title" class="text-[9px] font-black uppercase text-indigo-400">System Trace</span>
        <span id="toast-msg" class="text-xs font-bold mt-1 text-slate-200"></span>
    </div>

    <canvas id="photo-canvas" width="300" height="300"></canvas>

    <script>
        /** 1. CONFIGURATION */
        const CONFIG = {
            CLIENT_ID : '747138722746-5moie20nkh3hgpkrhfb4gmvmkiadjbku.apps.googleusercontent.com',
            API_KEY : 'AIzaSyA3v6zEyQhRq8X-PW0HG1eqhdmk8wbSg8s',
            SPREADSHEET_ID : '1UpHxRuvfYWguE78__bYR2sfjxRn6sskqOa5Po7XUoCU',
            OWNER_EMAIL : 'krishnahospitalsapotra@gmail.com',
            GEOFENCE_RADIUS_M: 150
        };

        let appState = {
            token: localStorage.getItem('access_token'),
            user: JSON.parse(localStorage.getItem('user_info')),
            stores: [], staff: [],
            employeeData: null,
            settings: { pin: '0000', pinEnabled: false },
            photoBase64: null, curLat: null, curLng: null,
            distanceFromStore: null
        };

        /** 2. AUTHENTICATION & LOGIN */
        window.onload = () => { 
            if(appState.token) { handleAuthSuccess(); } else { toggleView('auth'); }
            google.accounts.id.initialize({
                client_id: CONFIG.CLIENT_ID,
                callback: (resp) => { appState.token = resp.credential; localStorage.setItem('access_token', resp.credential); handleAuthSuccess(); }
            });
            google.accounts.id.renderButton(document.getElementById('google-login-container'), { theme: 'filled_black', size: 'large', shape: 'pill', width: 280 });
        };

        async function handleAuthSuccess() {
            showLoader(true, "Verifying Identity...");
            try {
                const res = await fetch(`https://www.googleapis.com/oauth2/v3/userinfo`, { headers: { Authorization: `Bearer ${appState.token}` } });
                if (!res.ok) { localStorage.removeItem('access_token'); location.reload(); return; }
                appState.user = await res.json();
                localStorage.setItem('user_info', JSON.stringify(appState.user));

                document.getElementById('user-display-name').innerText = appState.user.name || appState.user.email;
                document.getElementById('logout-btn').classList.remove('hidden');

                if (appState.user.email.toLowerCase() === CONFIG.OWNER_EMAIL.toLowerCase()) {
                    document.getElementById('admin-toggle-btn').classList.remove('hidden');
                }

                toggleView('attendance');
                await initializeData();
            } catch (e) { logout(); } finally { showLoader(false); }
        }

        async function initializeData() {
            try {
                const [sRes, eRes, setRes] = await Promise.all([
                    sheetsRequest('GET', '/values/Stores!A2:E').catch(() => ({})),
                    sheetsRequest('GET', '/values/Employees!A2:D').catch(() => ({})),
                    sheetsRequest('GET', '/values/Settings!A1:B2').catch(() => ({}))
                ]);

                appState.stores = (sRes.values || []).map((r, i) => ({ id: r[0], name: r[1], lat: r[2], lng: r[3], range: r[4] || 150, rowIdx: i + 2 }));
                appState.staff = (eRes.values || []).map((r, i) => ({ email: r[0].toLowerCase(), name: r[1], store: r[2], rowIdx: i + 2 }));
                
                // Set Global Employee Data
                appState.employeeData = appState.staff.find(s => s.email === appState.user.email.toLowerCase());

                if (appState.user.email.toLowerCase() !== CONFIG.OWNER_EMAIL.toLowerCase() && !appState.employeeData) {
                    document.getElementById('lockout-screen').style.display = 'flex';
                    return;
                }

                populateUI();
                startGeofencing();
            } catch (e) { console.warn("Init Error"); }
        }

        /** 3. GEOFENCING LOGIC (With Dynamic Range) */
        function startGeofencing() {
            if (!navigator.geolocation) { updateLocationUI("GPS NOT SUPPORTED", "fas fa-triangle-exclamation"); return; }
            navigator.geolocation.watchPosition(pos => {
                appState.curLat = pos.coords.latitude;
                appState.curLng = pos.coords.longitude;
                validateProximity();
            }, err => {
                updateLocationUI("LOCATION PERMISSION DENIED", "fas fa-ban text-rose-500");
            }, { enableHighAccuracy: true });
        }

        function validateProximity() {
            if (!appState.employeeData) return;
            const myStore = appState.stores.find(s => s.name === appState.employeeData.store);
            if (!myStore) { updateLocationUI("STORE DATA MISSING", "fas fa-triangle-exclamation"); return; }

            const dist = getDistance(appState.curLat, appState.curLng, myStore.lat, myStore.lng);
            appState.distanceFromStore = dist;
            
            const isInside = dist <= myStore.range;
            const distText = document.getElementById('distance-info');
            distText.innerText = `${dist.toFixed(1)}m from ${myStore.name}`;
            distText.classList.remove('hidden');

            if (isInside) {
                updateLocationUI("WITHIN PUNCH RANGE", "fas fa-check-circle text-emerald-500");
            } else {
                updateLocationUI("OUTSIDE RANGE", "fas fa-location-dot text-rose-500");
            }
            validatePunchState();
        }

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371000; // Earth radius in meters
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + 
                      Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * 
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function validatePunchState() {
            const errorEl = document.getElementById('punch-error');
            const myStore = appState.stores.find(s => s.name === appState.employeeData?.store);
            
            let errors = [];
            if (!appState.photoBase64) errors.push("Capture Identity Selfie");
            if (!appState.curLat) errors.push("Waiting for GPS Lock");
            if (appState.distanceFromStore > (myStore?.range || 150)) errors.push("Too far from Store");

            if (errors.length > 0) {
                errorEl.innerText = errors[0];
                errorEl.classList.remove('hidden');
                document.getElementById('btn-punch-in').disabled = true;
                document.getElementById('btn-punch-out').disabled = true;
            } else {
                errorEl.classList.add('hidden');
                document.getElementById('btn-punch-in').disabled = false;
                document.getElementById('btn-punch-out').disabled = false;
            }
        }

        /** 4. CAMERA LOGIC */
        async function startCamera() {
            try {
                const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
                const v = document.getElementById('video-preview'); v.srcObject = s; v.classList.remove('hidden');
                document.getElementById('camera-placeholder').classList.add('hidden');
                document.getElementById('start-camera-btn').classList.add('hidden');
                document.getElementById('capture-btn').classList.remove('hidden');
            } catch (e) { showToast("CAMERA PERMISSION DENIED"); }
        }

        function capturePhoto() {
            const v = document.getElementById('video-preview'); const c = document.getElementById('photo-canvas');
            c.getContext('2d').drawImage(v, 0, 0, 300, 300);
            appState.photoBase64 = c.toDataURL('image/jpeg', 0.6);
            document.getElementById('captured-photo').src = appState.photoBase64;
            document.getElementById('captured-photo').classList.remove('hidden');
            v.classList.add('hidden'); document.getElementById('capture-btn').classList.add('hidden');
            v.srcObject.getTracks().forEach(t => t.stop());
            validatePunchState();
        }

        /** 5. ADMIN CRUD (EDIT/SAVE) */
        // -- Store CRUD --
        document.getElementById('form-store').onsubmit = async (e) => {
            e.preventDefault();
            showLoader(true, "Syncing Store Data...");
            const name = document.getElementById('store-name').value;
            const lat = document.getElementById('store-lat').value;
            const lng = document.getElementById('store-lng').value;
            const range = document.getElementById('store-range').value;
            const rowIdx = document.getElementById('store-row-idx').value;

            try {
                if (rowIdx) {
                    await sheetsRequest('PUT', `/values/Stores!A${rowIdx}:E${rowIdx}?valueInputOption=USER_ENTERED`, { values: [[Date.now(), name, lat, lng, range]] });
                } else {
                    await sheetsRequest('POST', '/values/Stores!A:A:append?valueInputOption=USER_ENTERED', { values: [[Date.now(), name, lat, lng, range]] });
                }
                resetStoreForm();
                await initializeData();
            } catch (e) { alert(e.message); } finally { showLoader(false); }
        };

        function editStore(idx) {
            const s = appState.stores.find(st => st.rowIdx === idx);
            document.getElementById('store-form-title').innerText = "Edit Store: " + s.name;
            document.getElementById('store-name').value = s.name;
            document.getElementById('store-lat').value = s.lat;
            document.getElementById('store-lng').value = s.lng;
            document.getElementById('store-range').value = s.range;
            document.getElementById('store-row-idx').value = s.rowIdx;
            document.getElementById('store-cancel-btn').classList.remove('hidden');
            document.getElementById('store-save-btn').innerText = "UPDATE STORE";
            window.scrollTo(0,0);
        }

        function resetStoreForm() {
            document.getElementById('form-store').reset();
            document.getElementById('store-row-idx').value = "";
            document.getElementById('store-form-title').innerText = "Add New Store";
            document.getElementById('store-cancel-btn').classList.add('hidden');
            document.getElementById('store-save-btn').innerText = "SAVE STORE";
        }

        // -- Employee CRUD --
        document.getElementById('form-employee').onsubmit = async (e) => {
            e.preventDefault();
            showLoader(true, "Syncing Employee...");
            const email = document.getElementById('emp-email').value;
            const name = document.getElementById('emp-name').value;
            const store = document.getElementById('emp-store-select').value;
            const rowIdx = document.getElementById('staff-row-idx').value;

            try {
                if (rowIdx) {
                    await sheetsRequest('PUT', `/values/Employees!A${rowIdx}:D${rowIdx}?valueInputOption=USER_ENTERED`, { values: [[email, name, store, 'Active']] });
                } else {
                    await sheetsRequest('POST', '/values/Employees!A:A:append?valueInputOption=USER_ENTERED', { values: [[email, name, store, 'Active']] });
                }
                resetStaffForm();
                await initializeData();
            } catch (e) { alert(e.message); } finally { showLoader(false); }
        };

        function editStaff(idx) {
            const s = appState.staff.find(st => st.rowIdx === idx);
            document.getElementById('staff-form-title').innerText = "Edit Staff: " + s.name;
            document.getElementById('emp-email').value = s.email;
            document.getElementById('emp-name').value = s.name;
            document.getElementById('emp-store-select').value = s.store;
            document.getElementById('staff-row-idx').value = s.rowIdx;
            document.getElementById('staff-cancel-btn').classList.remove('hidden');
            document.getElementById('staff-save-btn').innerText = "UPDATE STAFF";
            window.scrollTo(0,0);
        }

        function resetStaffForm() {
            document.getElementById('form-employee').reset();
            document.getElementById('staff-row-idx').value = "";
            document.getElementById('staff-form-title').innerText = "Register New Staff";
            document.getElementById('staff-cancel-btn').classList.add('hidden');
            document.getElementById('staff-save-btn').innerText = "SAVE STAFF";
        }

        /** 6. SYSTEM BOILERPLATE */
        async function sheetsRequest(method, path, body = null) {
            const url = `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SPREADSHEET_ID}${path}`;
            const res = await fetch(url, { method, headers: { 'Authorization': `Bearer ${appState.token}`, 'Content-Type': 'application/json' }, body: body ? JSON.stringify(body) : null });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error?.message || "API Error");
            return data;
        }

        async function handlePunch(action) {
            showLoader(true, "Logging Attendance...");
            try {
                const row = [new Date().toLocaleString(), new Date().toISOString().split('T')[0], appState.user.email, action, appState.photoBase64, `${appState.curLat},${appState.curLng}`, "PRO-GATEWAY"];
                await sheetsRequest('POST', '/values/Attendance!A:A:append?valueInputOption=USER_ENTERED', { values: [row] });
                showToast("Punch Success!");
                location.reload();
            } catch (e) { alert("Failed: " + e.message); showLoader(false); }
        }

        function populateUI() {
            const options = appState.stores.map(s => `<option value="${s.name}">${s.name}</option>`).join('');
            document.getElementById('emp-store-select').innerHTML = `<option value="">Select Store</option>` + options;
            document.getElementById('manage-staff-filter').innerHTML = `<option value="all">Display All Personnel</option>` + options;
            renderStaffList(); renderStoresList();
        }

        function renderStaffList() {
            const filter = document.getElementById('manage-staff-filter').value;
            const data = filter === 'all' ? appState.staff : appState.staff.filter(s => s.store === filter);
            document.getElementById('staff-list').innerHTML = data.map(s => `
                <div class="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm border border-slate-100">
                    <div class="text-xs font-bold">${s.name}<p class="text-[9px] text-slate-400 font-normal italic">${s.email} • ${s.store}</p></div>
                    <div class="flex gap-2">
                        <button onclick="editStaff(${s.rowIdx})" class="text-indigo-600 p-2"><i class="fas fa-edit"></i></button>
                        <button onclick="deleteRow('Employees', ${s.rowIdx})" class="text-rose-500 p-2"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `).join('');
        }

        function renderStoresList() {
            document.getElementById('stores-list').innerHTML = appState.stores.map(s => `
                <div class="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm border border-slate-100">
                    <div class="text-xs font-bold">${s.name}<p class="text-[9px] text-slate-400 font-normal italic">Range: ${s.range}m • ${s.lat}, ${s.lng}</p></div>
                    <div class="flex gap-2">
                        <button onclick="editStore(${s.rowIdx})" class="text-indigo-600 p-2"><i class="fas fa-edit"></i></button>
                        <button onclick="deleteRow('Stores', ${s.rowIdx})" class="text-rose-500 p-2"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `).join('');
        }

        async function deleteRow(sheet, idx) {
            if (!confirm("Confirm permanent deletion?")) return;
            showLoader(true, "Deleting...");
            try {
                const meta = await sheetsRequest('GET', '?fields=sheets.properties');
                const id = meta.sheets.find(s => s.properties.title === sheet).properties.sheetId;
                await sheetsRequest('POST', ':batchUpdate', { requests: [{ deleteDimension: { range: { sheetId: id, dimension: "ROWS", startIndex: idx - 1, endIndex: idx } } }] });
                await initializeData();
            } catch (e) { alert(e.message); } finally { showLoader(false); }
        }

        function updateLocationUI(text, iconClass) {
            document.getElementById('location-text').innerText = text;
            document.getElementById('gps-icon').className = iconClass;
        }

        function toggleView(v) { ['auth', 'attendance', 'admin'].forEach(x => document.getElementById(`view-${x}`).classList.add('hidden')); document.getElementById(`view-${v}`).classList.remove('hidden'); }
        function showLoader(s, m) { document.getElementById('loader-msg').innerText = m; document.getElementById('loader').classList.toggle('active', s); }
        function showToast(m) { const t = document.getElementById('toast'); document.getElementById('toast-msg').innerText = m; t.classList.add('active'); setTimeout(() => t.classList.remove('active'), 3000); }
        function goHome() { toggleView('attendance'); }
        function logout() { localStorage.clear(); location.reload(); }
        function setAdminTab(t) { document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); document.getElementById('tab-'+t).classList.add('active'); ['dash', 'stores', 'staff'].forEach(x => document.getElementById('admin-'+x).classList.add('hidden')); document.getElementById('admin-'+t).classList.remove('hidden'); }
        async function enterAdminMode() { toggleView('admin'); setAdminTab('dash'); }
    </script>
</body>
</html>
