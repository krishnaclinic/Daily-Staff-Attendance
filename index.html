<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro-Attend | Professional Attendance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js" async defer></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 min-h-screen">
    <!-- Navigation Bar -->
    <nav class="bg-indigo-700 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black tracking-tighter cursor-pointer" onclick="switchView('staff')">PRO-ATTEND</h1>
            <div class="flex items-center gap-3">
                <button id="admin-switch-btn" onclick="switchView('admin')" class="hidden bg-white/20 hover:bg-white/30 px-3 py-1.5 rounded-lg text-xs font-bold transition-all">
                    ⚙️ ADMIN PANEL
                </button>
                <div id="user-badge" class="hidden bg-indigo-800 px-3 py-1 rounded-full text-[10px] font-medium flex items-center gap-2">
                    <span id="user-display-name">User</span>
                    <div class="w-1.5 h-1.5 bg-green-400 rounded-full animate-pulse"></div>
                </div>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-4 max-w-2xl">
        
        <!-- LOGIN VIEW -->
        <section id="login-view" class="mt-20 flex flex-col items-center">
            <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl border border-slate-100 text-center w-full max-w-sm">
                <div class="w-20 h-20 bg-indigo-100 rounded-3xl flex items-center justify-center mx-auto mb-6">
                    <svg class="w-10 h-10 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                </div>
                <h2 class="text-2xl font-black text-slate-800 mb-2">Welcome</h2>
                <p class="text-slate-500 mb-8 text-sm">Please sign in with your work email to mark attendance.</p>
                <button id="login-btn" class="w-full bg-slate-900 hover:bg-black text-white py-4 rounded-2xl font-bold shadow-xl transition-transform active:scale-95">Sign in with Google</button>
            </div>
        </section>

        <!-- EMPLOYEE (LANDING) VIEW -->
        <section id="staff-view" class="hidden space-y-6">
            <!-- Work Status Card -->
            <div class="bg-gradient-to-br from-indigo-600 to-violet-700 p-6 rounded-[2rem] text-white shadow-xl shadow-indigo-100">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-indigo-100 text-xs font-bold uppercase tracking-widest">Current Status</p>
                        <h2 id="staff-welcome" class="text-2xl font-black mt-1">Hello, Team Member!</h2>
                    </div>
                    <span id="shift-indicator" class="bg-white/20 px-3 py-1 rounded-full text-[10px] font-bold">NOT STARTED</span>
                </div>
                <div class="mt-4 flex items-center gap-2 text-indigo-100 text-sm">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path></svg>
                    <span id="staff-store-tag">Loading location...</span>
                </div>
            </div>

            <!-- Attendance Main Interface -->
            <div id="attendance-box" class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100">
                <div id="camera-container" class="relative bg-slate-900 rounded-3xl overflow-hidden mb-6 aspect-[4/3] shadow-inner">
                    <video id="video" autoplay playsinline class="w-full h-full object-cover"></video>
                    <canvas id="canvas" class="hidden"></canvas>
                    <img id="photo-preview" class="hidden absolute inset-0 w-full h-full object-cover">
                    <div class="absolute bottom-4 inset-x-0 flex justify-center">
                        <button id="capture-btn" class="bg-white/20 backdrop-blur-md border border-white/40 p-4 rounded-full text-white hover:bg-white/40">
                            <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4 5a2 2 0 00-2 2v8a2 2 0 002 2h12a2 2 0 002-2V7a2 2 0 00-2-2h-1.586a1 1 0 01-.707-.293l-1.121-1.121A2 2 0 0011.172 3H8.828a2 2 0 00-1.414.586L6.293 4.707A1 1 0 015.586 5H4zm6 9a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd"></path></svg>
                        </button>
                    </div>
                </div>

                <div id="status-display" class="mb-4 text-center py-2 px-4 bg-slate-50 rounded-xl text-xs font-bold text-slate-500 flex items-center justify-center gap-2">
                    <div class="w-2 h-2 bg-slate-300 rounded-full"></div> Verify Photo & GPS to proceed
                </div>

                <div class="flex gap-4">
                    <button id="punch-in-btn" disabled class="flex-1 bg-emerald-500 text-white py-5 rounded-2xl font-black shadow-lg shadow-emerald-100 opacity-50 active:scale-95 transition-all">PUNCH IN</button>
                    <button id="punch-out-btn" disabled class="flex-1 bg-rose-500 text-white py-5 rounded-2xl font-black shadow-lg shadow-rose-100 opacity-50 active:scale-95 transition-all">PUNCH OUT</button>
                </div>
            </div>

            <!-- History Section -->
            <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100">
                <h3 class="font-bold text-slate-800 mb-4 flex justify-between items-center">
                    Personal History
                    <span class="text-[10px] text-slate-400 font-normal uppercase">Last 5 Records</span>
                </h3>
                <div id="personal-history-list" class="space-y-3">
                    <!-- History items injected here -->
                </div>
            </div>
        </section>

        <!-- ADMIN (MANAGEMENT) VIEW -->
        <section id="admin-view" class="hidden space-y-6">
            <div id="setup-card" class="hidden bg-orange-50 p-6 rounded-3xl border-2 border-dashed border-orange-200">
                <h3 class="font-bold text-orange-800 mb-2">Initialize Sheets</h3>
                <button onclick="initializeSheetStructure()" class="bg-orange-600 text-white px-4 py-2 rounded-xl text-sm font-bold">Build Database Structure</button>
            </div>

            <!-- Dashboard Stats -->
            <div class="grid grid-cols-3 gap-3">
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                    <p class="text-slate-400 text-[10px] font-bold uppercase">Present</p>
                    <p id="count-present" class="text-xl font-black">0</p>
                </div>
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                    <p class="text-slate-400 text-[10px] font-bold uppercase">Stores</p>
                    <p id="count-stores" class="text-xl font-black">0</p>
                </div>
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                    <p class="text-slate-400 text-[10px] font-bold uppercase">Offline</p>
                    <p id="count-offline" class="text-xl font-black">0</p>
                </div>
            </div>

            <!-- Smart Manager -->
            <div class="bg-white rounded-[2rem] shadow-sm border border-slate-100 overflow-hidden">
                <div class="bg-slate-900 p-4 flex justify-between items-center">
                    <h3 class="text-white font-bold">Smart Manager</h3>
                    <div class="flex gap-2">
                        <button onclick="showManager('stores')" class="text-[10px] bg-white/10 px-3 py-1 rounded-full text-white">Stores</button>
                        <button onclick="showManager('employees')" class="text-[10px] bg-white/10 px-3 py-1 rounded-full text-white">Staff</button>
                    </div>
                </div>
                
                <div id="manager-content" class="p-4 min-h-[300px]">
                    <!-- Forms and Lists will load here -->
                </div>
            </div>
        </section>

    </main>

    <!-- Global Loader -->
    <div id="loader" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-[100]">
        <div class="bg-white p-6 rounded-3xl shadow-2xl flex flex-col items-center">
            <div class="w-10 h-10 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
            <p class="mt-4 font-bold text-slate-700 text-sm">Processing...</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
