<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro-Attend | Enterprise v4.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .loading-overlay { display: none; background: rgba(255,255,255,0.98); z-index: 9999; position: fixed; inset: 0; }
        .loading-overlay.active { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #video-preview, #captured-photo { transform: scaleX(-1); border-radius: 1.5rem; border: 4px solid white; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); width: 100%; height: 100%; object-fit: cover; }
        .tab-btn.active { border-bottom: 3px solid #4338ca; color: #4338ca; }
        .locked-screen { display: none; position: fixed; inset: 0; background: white; z-index: 10000; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2rem; }
        canvas { display: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .btn-punch:disabled { opacity: 0.2; transform: scale(0.98); }
        .step-locked { display: none; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">

    <!-- Global Loader -->
    <div id="loader" class="loading-overlay">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-700 mb-4"></div>
        <p id="loader-msg" class="font-bold text-indigo-700 uppercase tracking-tighter text-[10px]">Verifying Gateway...</p>
    </div>

    <!-- Security Lockout -->
    <div id="lockout-screen" class="locked-screen">
        <div class="w-24 h-24 bg-rose-100 text-rose-600 rounded-full flex items-center justify-center mb-6"><i class="fas fa-user-lock text-4xl"></i></div>
        <h2 class="text-2xl font-black text-slate-800">ACCESS DENIED</h2>
        <p class="text-slate-500 text-sm max-w-xs mb-8 italic">Unauthorized email. Contact Manager.</p>
        <button onclick="logout()" class="bg-slate-900 text-white px-10 py-4 rounded-2xl font-black">Sign Out</button>
    </div>

    <!-- App Header -->
    <header class="bg-indigo-700 text-white p-4 shadow-xl sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 onclick="goHome()" class="text-xl font-black italic cursor-pointer flex items-center gap-2 select-none uppercase tracking-tighter">
                <i class="fas fa-fingerprint"></i> PRO-ATTEND
            </h1>
            <div class="flex gap-2">
                <button id="admin-toggle-btn" onclick="enterAdminMode()" class="hidden bg-white/20 px-4 py-2 rounded-xl text-xs font-bold transition hover:bg-white/40"><i class="fas fa-user-shield"></i></button>
                <button onclick="logout()" class="bg-rose-600 px-4 py-2 rounded-xl text-xs font-bold shadow-md"><i class="fas fa-power-off"></i></button>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4">
        
        <!-- LOGIN VIEW -->
        <section id="view-auth" class="mt-20 text-center animate-fade-in">
            <div class="bg-white p-12 rounded-[3rem] shadow-2xl max-w-sm mx-auto border border-slate-100">
                <div class="w-20 h-20 bg-indigo-50 rounded-3xl flex items-center justify-center mx-auto mb-8 transform rotate-3"><i class="fas fa-id-card-clip text-4xl text-indigo-600"></i></div>
                <h2 class="text-2xl font-black text-slate-800 tracking-tighter uppercase mb-12">Portal Access</h2>
                <button onclick="login()" class="w-full bg-indigo-700 text-white p-5 rounded-2xl flex items-center justify-center gap-4 font-black shadow-2xl border-b-4 border-indigo-900 transition active:scale-95">
                    <i class="fab fa-google text-xl"></i> SIGN IN WITH GOOGLE
                </button>
            </div>
        </section>

        <!-- ATTENDANCE VIEW -->
        <section id="view-attendance" class="hidden space-y-6">
            <!-- User Status Card -->
            <div class="bg-white p-6 rounded-3xl shadow-lg border-l-8 border-indigo-600 flex justify-between items-center">
                <div>
                    <h2 id="shift-status" class="text-2xl font-black text-slate-800 tracking-tight italic uppercase leading-none mb-2 text-indigo-700">Syncing...</h2>
                    <p id="user-display-name" class="text-slate-400 text-sm font-medium flex items-center gap-2 italic">
                        <i class="fas fa-circle-user text-indigo-400"></i> Authenticating...
                    </p>
                </div>
                <div id="status-dot" class="w-4 h-4 rounded-full bg-slate-200 animate-pulse border-2 border-white shadow-sm"></div>
            </div>

            <!-- Attendance Controls -->
            <div id="punch-container" class="bg-white p-8 rounded-[2.5rem] shadow-xl space-y-8 text-center border border-slate-100">
                
                <!-- GPS Diagnostic Display -->
                <div id="location-card" class="bg-slate-50 p-6 rounded-3xl border-2 border-dashed border-slate-200 shadow-inner">
                    <div class="flex flex-col items-center gap-1">
                        <div id="location-status" class="text-[10px] font-black text-slate-400 uppercase tracking-widest flex items-center gap-2">
                            <i class="fas fa-location-crosshairs animate-spin" id="gps-icon"></i> <span id="location-text">Detecting GPS...</span>
                        </div>
                        <div id="distance-info" class="text-base font-black text-indigo-700 hidden italic"></div>
                        <div id="distance-hint" class="text-[9px] font-bold text-rose-400 uppercase tracking-tight hidden italic"></div>
                    </div>
                </div>

                <!-- Camera Identity Section -->
                <div id="camera-section" class="hidden animate-fade-in">
                    <div class="relative overflow-hidden bg-slate-900 rounded-3xl aspect-square max-w-[300px] mx-auto border-4 border-white shadow-2xl flex items-center justify-center mb-6">
                        <video id="video-preview" autoplay playsinline class="hidden"></video>
                        <img id="captured-photo" class="hidden" />
                        <div id="camera-placeholder" class="text-slate-500 flex flex-col items-center">
                            <i class="fas fa-camera text-6xl mb-3 opacity-20"></i>
                            <span class="text-[10px] font-black uppercase tracking-widest opacity-40">Identity Capture</span>
                        </div>
                        <div class="absolute bottom-6 left-0 right-0 flex justify-center gap-3 px-6">
                            <button onclick="startCamera()" id="start-camera-btn" class="bg-indigo-600 text-white px-6 py-4 rounded-2xl text-[10px] font-black shadow-xl w-full">START CAMERA</button>
                            <button onclick="capturePhoto()" id="capture-btn" class="hidden bg-emerald-500 text-white px-6 py-4 rounded-2xl text-[10px] font-black shadow-xl w-full animate-pulse">CAPTURE PHOTO</button>
                        </div>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div id="action-section" class="hidden grid grid-cols-2 gap-5 pb-4 animate-fade-in">
                    <button id="btn-punch-in" onclick="handlePunch('IN')" class="bg-emerald-500 text-white py-6 rounded-3xl font-black text-xl shadow-lg border-b-8 border-emerald-700 uppercase italic">In</button>
                    <button id="btn-punch-out" onclick="handlePunch('OUT')" class="bg-rose-600 text-white py-6 rounded-3xl font-black text-xl shadow-lg border-b-8 border-rose-800 uppercase italic">Out</button>
                </div>
            </div>

            <!-- Punch Completed Message -->
            <div id="shift-completed" class="hidden bg-emerald-50 border-2 border-emerald-200 p-12 rounded-[3rem] text-center shadow-inner">
                <i class="fas fa-circle-check text-7xl text-emerald-500 mb-4 shadow-sm"></i>
                <h3 class="text-2xl font-black text-emerald-800 uppercase italic leading-none">Completed</h3>
                <p class="text-xs text-emerald-600 font-bold uppercase tracking-widest mt-2">Shift data synced for today.</p>
            </div>
        </section>

        <!-- ADMIN VIEW -->
        <section id="view-admin" class="hidden space-y-6 pb-20">
            <div class="flex border-b border-slate-200 overflow-x-auto gap-4 no-scrollbar">
                <button onclick="setAdminTab('dash')" class="tab-btn px-4 py-4 font-black text-[10px] active uppercase tracking-widest" id="tab-dash">Dashboard</button>
                <button onclick="setAdminTab('staff')" class="tab-btn px-4 py-4 font-black text-[10px] uppercase tracking-widest" id="tab-staff">Staff</button>
                <button onclick="setAdminTab('stores')" class="tab-btn px-4 py-4 font-black text-[10px] uppercase tracking-widest" id="tab-stores">Stores</button>
                <button onclick="setAdminTab('setup')" class="tab-btn px-4 py-4 font-black text-[10px] uppercase tracking-widest" id="tab-setup">System</button>
            </div>

            <!-- DASHBOARD / REPORTS -->
            <div id="admin-dash" class="space-y-6">
                <div class="bg-white p-6 rounded-[2.5rem] shadow-xl border border-slate-100 space-y-6">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="flex flex-col gap-1">
                            <label class="text-[9px] font-black text-slate-400 uppercase ml-1">FROM DATE</label>
                            <input type="date" id="filter-start" class="border-2 p-4 rounded-2xl text-xs font-bold outline-none focus:border-indigo-500 bg-slate-50 shadow-inner">
                        </div>
                        <div class="flex flex-col gap-1">
                            <label class="text-[9px] font-black text-slate-400 uppercase ml-1">TO DATE</label>
                            <input type="date" id="filter-end" class="border-2 p-4 rounded-2xl text-xs font-bold outline-none focus:border-indigo-500 bg-slate-50 shadow-inner">
                        </div>
                        <select id="filter-store" class="col-span-2 border-2 p-4 rounded-2xl text-xs font-black bg-slate-50 outline-none focus:border-indigo-500 shadow-inner"></select>
                        <button onclick="loadDashboardReport()" class="col-span-2 bg-indigo-700 text-white p-5 rounded-2xl font-black shadow-xl hover:bg-indigo-800 transition uppercase tracking-widest">
                            <i class="fas fa-magnifying-glass mr-1"></i> Sync Report
                        </button>
                    </div>
                </div>
                <div id="report-results" class="space-y-3 pb-20"></div>
            </div>

            <!-- STAFF MANAGEMENT TAB -->
            <div id="admin-staff" class="hidden space-y-6">
                <form id="form-employee" class="bg-white p-8 rounded-[2.5rem] shadow-xl space-y-4 border border-slate-100">
                    <h3 id="staff-form-title" class="font-black text-sm uppercase italic tracking-tighter">Onboard Member</h3>
                    <input type="hidden" id="staff-row-idx">
                    <input type="email" id="emp-email" placeholder="Email" class="w-full border-2 p-5 rounded-2xl outline-none bg-slate-50 focus:border-emerald-500 transition shadow-inner" required>
                    <input type="text" id="emp-name" placeholder="Full Name" class="w-full border-2 p-5 rounded-2xl outline-none bg-slate-50 focus:border-emerald-500 transition shadow-inner" required>
                    <select id="emp-store-select" class="w-full border-2 p-5 rounded-2xl outline-none bg-slate-50 focus:border-emerald-500 transition shadow-inner" required></select>
                    <div class="flex gap-2">
                        <button type="submit" id="staff-save-btn" class="flex-1 bg-emerald-600 text-white p-5 rounded-2xl font-black shadow-lg">SAVE PROFILE</button>
                        <button type="button" id="staff-cancel-btn" onclick="resetStaffForm()" class="hidden bg-slate-200 text-slate-600 p-5 rounded-2xl font-black uppercase text-xs">Cancel</button>
                    </div>
                </form>
                <div id="staff-list" class="space-y-2"></div>
            </div>

            <!-- STORE MANAGEMENT TAB -->
            <div id="admin-stores" class="hidden space-y-6">
                <form id="form-store" class="bg-white p-8 rounded-[2.5rem] shadow-xl space-y-4 border border-slate-100">
                    <h3 id="store-form-title" class="font-black text-sm uppercase italic tracking-tighter text-indigo-700 underline decoration-indigo-200">Store Hub</h3>
                    <input type="hidden" id="store-row-idx">
                    <input type="text" id="store-name" placeholder="Location Name" class="w-full border-2 p-5 rounded-2xl outline-none bg-slate-50 focus:border-indigo-500 transition shadow-inner" required>
                    <div class="grid grid-cols-2 gap-4">
                        <input type="text" id="store-lat" placeholder="Latitude" class="border-2 p-5 rounded-2xl bg-slate-50 outline-none shadow-inner" required>
                        <input type="text" id="store-lng" placeholder="Longitude" class="border-2 p-5 rounded-2xl bg-slate-50 outline-none shadow-inner" required>
                        <input type="number" id="store-range" placeholder="Punch Range (m)" class="col-span-2 border-2 p-5 rounded-2xl bg-slate-50 font-black shadow-inner" value="150" required>
                    </div>
                    <div class="flex gap-2">
                        <button type="submit" id="store-save-btn" class="flex-1 bg-slate-900 text-white p-5 rounded-2xl font-black shadow-lg italic">SAVE LOCATION</button>
                        <button type="button" id="store-cancel-btn" onclick="resetStoreForm()" class="hidden bg-slate-200 text-slate-600 p-5 rounded-2xl font-black uppercase text-xs">Cancel</button>
                    </div>
                </form>
                <div id="stores-list" class="space-y-2"></div>
            </div>

            <!-- SYSTEM SETTINGS TAB -->
            <div id="admin-setup" class="hidden space-y-6">
                <div class="bg-white p-10 rounded-[3rem] shadow-2xl text-center border border-slate-100">
                    <div id="db-status-badge" class="inline-block px-5 py-2 rounded-full text-[10px] font-black mb-8 uppercase tracking-widest bg-slate-100">Syncing Health...</div>
                    <button id="btn-repair-db" disabled onclick="adminSyncDatabase()" class="w-full bg-slate-100 text-slate-300 p-8 rounded-[2rem] font-black italic shadow-inner">REPAIR SYSTEM DATABASE</button>
                    <div class="mt-12 p-8 bg-slate-50 rounded-[3rem] text-left border-2 border-slate-100 shadow-inner">
                        <div class="flex items-center justify-between mb-4">
                            <span class="text-xs font-black uppercase text-slate-400">PIN Protection</span>
                            <input type="checkbox" id="pin-toggle" onchange="updateSecuritySettings()" class="w-6 h-6">
                        </div>
                        <input type="password" id="admin-pin-code" maxlength="4" placeholder="••••" class="w-full border-2 p-6 rounded-3xl text-center font-black text-4xl tracking-[0.5em] outline-none shadow-sm">
                        <button onclick="updateSecuritySettings()" class="w-full mt-4 bg-indigo-700 text-white p-5 rounded-3xl font-black text-[10px] uppercase shadow-xl tracking-widest">Save PIN Settings</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <canvas id="photo-canvas" width="300" height="300"></canvas>

    <script>
        /** 1. CONFIGURATION */
        const CONFIG = {
            CLIENT_ID : '747138722746-5moie20nkh3hgpkrhfb4gmvmkiadjbku.apps.googleusercontent.com',
            API_KEY : 'AIzaSyA3v6zEyQhRq8X-PW0HG1eqhdmk8wbSg8s',
            SPREADSHEET_ID : '1UpHxRuvfYWguE78__bYR2sfjxRn6sskqOa5Po7XUoCU',
            OWNER_EMAIL : 'krishnahospitalsapotra@gmail.com'
        };

        let appState = {
            token: localStorage.getItem('access_token'),
            user: JSON.parse(localStorage.getItem('user_info')),
            stores: [], staff: [], empData: null,
            settings: { pin: '0000', pinEnabled: false },
            photoBase64: null, curLat: null, curLng: null, dist: null,
            gpsFixed: false
        };

        /** 2. AUTHENTICATION & REFRESH FIX */
        window.onload = () => {
            initGIS();
            document.getElementById('filter-start').valueAsDate = new Date();
            document.getElementById('filter-end').valueAsDate = new Date();
            if(appState.token) { 
                handleAuthSuccess(); // RESTORE SESSION ON REFRESH
            } else { 
                toggleView('auth'); 
            }
        };

        let tokenClient;
        function initGIS() {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CONFIG.CLIENT_ID,
                scope: 'https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/userinfo.email https://www.googleapis.com/auth/userinfo.profile',
                callback: (resp) => { if (resp.access_token) { appState.token = resp.access_token; localStorage.setItem('access_token', resp.access_token); handleAuthSuccess(); } }
            });
        }

        function login() { tokenClient.requestAccessToken(); }

        async function handleAuthSuccess() {
            showLoader(true, "Synchronizing Gateway...");
            try {
                const res = await fetch(`https://www.googleapis.com/oauth2/v3/userinfo`, { headers: { Authorization: `Bearer ${appState.token}` } });
                if (!res.ok) { logout(); return; }
                appState.user = await res.json();
                localStorage.setItem('user_info', JSON.stringify(appState.user));

                document.getElementById('user-display-name').innerHTML = `<i class="fas fa-check-circle text-emerald-400"></i> ${appState.user.name}`;
                if (appState.user.email.toLowerCase() === CONFIG.OWNER_EMAIL.toLowerCase()) document.getElementById('admin-toggle-btn').classList.remove('hidden');

                toggleView('attendance');
                await initializeData();
            } catch (e) { logout(); } finally { showLoader(false); }
        }

        async function initializeData() {
            try {
                const [sRes, eRes, setRes] = await Promise.all([
                    sheetsRequest('GET', '/values/Stores!A2:E').catch(() => ({})),
                    sheetsRequest('GET', '/values/Employees!A2:D').catch(() => ({})),
                    sheetsRequest('GET', '/values/Settings!A1:B2').catch(() => ({}))
                ]);

                appState.stores = (sRes.values || []).map((r, i) => ({ id: r[0], name: r[1], lat: parseFloat(r[2]), lng: parseFloat(r[3]), range: parseInt(r[4]) || 150, rowIdx: i + 2 }));
                appState.staff = (eRes.values || []).map((r, i) => ({ email: r[0].toLowerCase(), name: r[1], store: r[2], rowIdx: i + 2 }));
                
                if (setRes.values) {
                    appState.settings.pinEnabled = setRes.values[0][1] === 'true';
                    appState.settings.pin = setRes.values[1][1];
                    document.getElementById('pin-toggle').checked = appState.settings.pinEnabled;
                    document.getElementById('admin-pin-code').value = appState.settings.pin;
                }

                appState.empData = appState.staff.find(s => s.email === appState.user.email.toLowerCase());
                if (appState.user.email.toLowerCase() !== CONFIG.OWNER_EMAIL.toLowerCase() && !appState.empData) {
                    document.getElementById('lockout-screen').style.display = 'flex';
                    return;
                }

                populateUI();
                await checkShiftStatus();
            } catch (e) { checkDatabaseHealth(); }
        }

        /** 3. HARDENED GPS FAIL-SAFE LOGIC */
        function startGeofencing() {
            if (!navigator.geolocation) { updateLocUI("GPS NOT SUPPORTED", "fa-ban"); return; }
            
            // Watchdog: If high accuracy hangs, force standard mode
            let gpsTimeout = setTimeout(() => {
                if (!appState.gpsFixed) {
                    console.warn("GPS High-Accuracy Timed out. Falling back to Standard Mode.");
                    navigator.geolocation.watchPosition(pos => handleGPSFix(pos), () => {
                        updateLocUI("GPS SIGNAL LOST", "fa-triangle-exclamation text-rose-500");
                    }, { enableHighAccuracy: false });
                }
            }, 7000);

            navigator.geolocation.watchPosition(pos => {
                clearTimeout(gpsTimeout);
                handleGPSFix(pos);
            }, () => {
                updateLocUI("PERMISSION DENIED", "fa-triangle-exclamation text-rose-500");
            }, { enableHighAccuracy: true });
        }

        function handleGPSFix(pos) {
            appState.curLat = pos.coords.latitude;
            appState.curLng = pos.coords.longitude;
            appState.gpsFixed = true;
            validateProximity();
        }

        function validateProximity() {
            if (!appState.empData || !appState.gpsFixed) return;
            const store = appState.stores.find(s => s.name === appState.empData.store);
            if (!store) { updateLocUI("STORE UNKNOWN", "fa-circle-question"); return; }

            const d = getDist(appState.curLat, appState.curLng, store.lat, store.lng);
            appState.dist = d;
            
            const info = document.getElementById('distance-info');
            const hint = document.getElementById('distance-hint');
            info.innerText = `${d.toFixed(1)}m from Store`;
            info.classList.remove('hidden');

            if (d <= store.range) {
                updateLocUI("IN PUNCH RANGE", "fa-circle-check text-emerald-500");
                document.getElementById('status-dot').className = "w-4 h-4 rounded-full bg-emerald-500 shadow-lg animate-pulse border-2 border-white";
                document.getElementById('camera-section').classList.remove('hidden');
                hint.classList.add('hidden');
            } else {
                updateLocUI("MOVE CLOSER TO STORE", "fa-location-dot text-rose-500");
                document.getElementById('status-dot').className = "w-4 h-4 rounded-full bg-rose-500 border-2 border-white shadow-lg";
                document.getElementById('camera-section').classList.add('hidden');
                hint.innerText = `Entrance required. You are ${Math.round(d - store.range)}m outside.`;
                hint.classList.remove('hidden');
            }
            validatePunchState();
        }

        function getDist(lat1, lon1, lat2, lon2) {
            const R = 6371000;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        /** 4. ATTENDANCE & LOCKING LOGIC */
        async function checkShiftStatus() {
            try {
                const today = new Date().toISOString().split('T')[0];
                const res = await sheetsRequest('GET', '/values/Attendance!A2:D');
                const logs = (res.values || []).filter(r => r[1] === today && r[2].toLowerCase() === appState.user.email.toLowerCase());
                
                const hasIn = logs.some(l => l[3] === 'IN');
                const hasOut = logs.some(l => l[3] === 'OUT');

                const statusEl = document.getElementById('shift-status');
                if (hasOut) {
                    statusEl.innerText = "SHIFT COMPLETED";
                    document.getElementById('punch-container').classList.add('hidden');
                    document.getElementById('shift-completed').classList.remove('hidden');
                } else if (hasIn) {
                    statusEl.innerText = "SHIFT IN PROGRESS";
                    document.getElementById('btn-punch-in').style.display = 'none';
                    startGeofencing();
                } else {
                    statusEl.innerText = "SHIFT NOT STARTED";
                    document.getElementById('btn-punch-out').style.display = 'none';
                    startGeofencing();
                }
            } catch (e) { startGeofencing(); }
        }

        function validatePunchState() {
            const actionSection = document.getElementById('action-section');
            const store = appState.stores.find(s => s.name === appState.empData?.store);
            
            if (appState.dist <= (store?.range || 150) && appState.photoBase64) {
                actionSection.classList.remove('hidden');
            } else {
                actionSection.classList.add('hidden');
            }
        }

        /** 5. CAMERA & PUNCH */
        async function startCamera() {
            try {
                const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
                const v = document.getElementById('video-preview'); v.srcObject = s; v.classList.remove('hidden');
                document.getElementById('camera-placeholder').classList.add('hidden');
                document.getElementById('start-camera-btn').classList.add('hidden');
                document.getElementById('capture-btn').classList.remove('hidden');
            } catch (e) { alert("Camera Permission Required"); }
        }

        function capturePhoto() {
            const v = document.getElementById('video-preview'); const c = document.getElementById('photo-canvas');
            c.getContext('2d').drawImage(v, 0, 0, 300, 300);
            appState.photoBase64 = c.toDataURL('image/jpeg', 0.6);
            document.getElementById('captured-photo').src = appState.photoBase64;
            document.getElementById('captured-photo').classList.remove('hidden');
            v.classList.add('hidden'); document.getElementById('capture-btn').classList.add('hidden');
            v.srcObject.getTracks().forEach(t => t.stop()); validatePunchState();
        }

        async function handlePunch(action) {
            showLoader(true, "Finalizing Log...");
            try {
                const row = [new Date().toLocaleString(), new Date().toISOString().split('T')[0], appState.user.email, action, appState.photoBase64, `${appState.curLat},${appState.curLng}`, "CLIENT-APP"];
                await sheetsRequest('POST', '/values/Attendance!A:A:append?valueInputOption=USER_ENTERED', { values: [row] });
                location.reload();
            } catch (e) { alert("Sync Error: " + e.message); showLoader(false); }
        }

        /** 6. ADMIN CRUD & MANUAL ATTENDANCE OVERRIDE */
        async function loadDashboardReport() {
            showLoader(true, "Compiling Analytics...");
            const results = document.getElementById('report-results');
            try {
                const res = await sheetsRequest('GET', '/values/Attendance!A2:G');
                const start = document.getElementById('filter-start').value;
                const end = document.getElementById('filter-end').value;
                const store = document.getElementById('filter-store').value;
                let logs = (res.values || []).map((r, i) => ({ ts: r[0], date: r[1], email: r[2], action: r[3], rowIdx: i + 2 }));
                if (start) logs = logs.filter(l => l.date >= start);
                if (end) logs = logs.filter(l => l.date <= end);
                if (store) { const emails = appState.staff.filter(s => s.store === store).map(s => s.email); logs = logs.filter(l => emails.includes(l.email.toLowerCase())); }

                results.innerHTML = `<div class="grid grid-cols-2 gap-4"><div class="bg-indigo-700 text-white p-5 rounded-3xl text-center shadow-lg"><p class="text-[8px] font-black uppercase opacity-60 tracking-widest">Punches</p><p class="text-2xl font-black">${logs.length}</p></div><div class="bg-slate-900 text-white p-5 rounded-3xl text-center shadow-lg"><p class="text-[8px] font-black uppercase opacity-60 tracking-widest">Active</p><p class="text-2xl font-black">${new Set(logs.map(l=>l.email)).size}</p></div></div>` + logs.slice().reverse().map(l => `<div class="bg-white p-4 rounded-2xl border flex justify-between items-center shadow-sm"><div class="text-[10px] font-black uppercase">${l.email.split('@')[0]}<p class="text-[8px] text-slate-400 font-normal italic">${l.date} @ ${l.ts.split(', ')[1]}</p></div><div class="flex items-center gap-3"><span class="px-3 py-1 rounded-full text-[8px] font-black ${l.action === 'IN' ? 'bg-emerald-50 text-emerald-600' : 'bg-rose-50 text-rose-600'}">${l.action}</span><button onclick="editAttendance(${l.rowIdx}, '${l.action}')" class="text-indigo-600 p-2"><i class="fas fa-pen-to-square"></i></button></div></div>`).join('');
            } catch (e) { results.innerHTML = `<p class="text-center font-black uppercase text-rose-500 py-10 opacity-40">Sync Engine Offline</p>`; } finally { showLoader(false); }
        }

        async function editAttendance(row, curr) {
            const val = prompt("Override Attendance Status (IN or OUT):", curr);
            if (!val || (val.toUpperCase() !== 'IN' && val.toUpperCase() !== 'OUT')) return;
            showLoader(true, "Overwriting...");
            await sheetsRequest('PUT', `/values/Attendance!D${row}?valueInputOption=USER_ENTERED`, { values: [[val.toUpperCase()]] });
            loadDashboardReport();
        }

        /** 7. SYSTEM BOILERPLATE */
        async function sheetsRequest(method, path, body = null) {
            const url = `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SPREADSHEET_ID}${path}`;
            const res = await fetch(url, { method, headers: { 'Authorization': `Bearer ${appState.token}`, 'Content-Type': 'application/json' }, body: body ? JSON.stringify(body) : null });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error?.message || "Sync Error");
            return data;
        }
        function showLoader(s, m) { document.getElementById('loader-msg').innerText = m; document.getElementById('loader').classList.toggle('active', s); }
        function toggleView(v) { ['auth', 'attendance', 'admin'].forEach(x => document.getElementById(`view-${x}`).classList.add('hidden')); document.getElementById(`view-${v}`).classList.remove('hidden'); }
        function logout() { localStorage.clear(); location.reload(); }
        function goHome() { toggleView('attendance'); }
        function setAdminTab(t) { document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); document.getElementById('tab-'+t).classList.add('active'); ['dash', 'stores', 'staff', 'setup'].forEach(x => document.getElementById('admin-'+x).classList.add('hidden')); document.getElementById('admin-'+t).classList.remove('hidden'); if(t==='dash') loadDashboardReport(); }
        function updateLocUI(t, i) { document.getElementById('location-text').innerText = t; document.getElementById('gps-icon').className = "fas " + i; }
        function populateUI() {
            const opt = appState.stores.map(s => `<option value="${s.name}">${s.name}</option>`).join('');
            document.getElementById('emp-store-select').innerHTML = `<option value="">Select Store</option>` + opt;
            document.getElementById('filter-store').innerHTML = `<option value="">All Registered Stores</option>` + opt;
            renderStaffList(); renderStoresList(); checkDatabaseHealth();
        }
        async function adminSyncDatabase() {
            showLoader(true, "Healing System...");
            const schema = [{ name: 'Stores', h: ['ID', 'Name', 'Lat', 'Lng', 'Range'] }, { name: 'Employees', h: ['Email', 'Name', 'StoreName', 'Status'] }, { name: 'Attendance', h: ['Timestamp', 'Date', 'Email', 'Action', 'Photo', 'GPS', 'Device'] }, { name: 'Settings', h: ['Key', 'Value'] }];
            for (const sheet of schema) { 
                await sheetsRequest('POST', ':batchUpdate', { requests: [{ addSheet: { properties: { title: sheet.name } } }] }).catch(()=>{});
                await sheetsRequest('PUT', `/values/${sheet.name}!A1:G1?valueInputOption=RAW`, { values: [sheet.h] }).catch(()=>{});
            }
            initializeData();
        }
        async function enterAdminMode() { 
            if (appState.settings.pinEnabled) {
                const pin = prompt("Admin Security PIN:");
                if (pin === appState.settings.pin) setAdminTab('dash'), toggleView('admin');
                else alert("Access Denied");
            } else { setAdminTab('dash'), toggleView('admin'); }
        }
        async function updateSecuritySettings() {
            showLoader(true, "Updating PIN...");
            const pin = document.getElementById('admin-pin-code').value; const enabled = document.getElementById('pin-toggle').checked;
            try { await sheetsRequest('PUT', '/values/Settings!A1:B2?valueInputOption=RAW', { values: [['PIN_ENABLED', enabled], ['ADMIN_PIN', pin]] }); appState.settings = { pin, pinEnabled: enabled }; alert("Security Saved"); } catch (e) { alert(e.message); } finally { showLoader(false); }
        }
        function renderStaffList() {
            document.getElementById('staff-list').innerHTML = appState.staff.map(s => `<div class="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm border"><div class="text-[10px] font-black uppercase text-slate-800">${s.name}<p class="text-[8px] text-slate-400 italic">${s.email} • ${s.store}</p></div><div class="flex gap-2"><button onclick="editStaff(${s.rowIdx})" class="text-indigo-600 p-2"><i class="fas fa-edit"></i></button><button onclick="deleteRow('Employees', ${s.rowIdx})" class="text-rose-500 p-2"><i class="fas fa-trash"></i></button></div></div>`).join('');
        }
        function renderStoresList() {
            document.getElementById('stores-list').innerHTML = appState.stores.map(s => `<div class="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm border"><div class="text-[10px] font-black uppercase text-slate-800">${s.name}<p class="text-[8px] text-slate-400 italic">Fence: ${s.range}m • ${s.lat}, ${s.lng}</p></div><div class="flex gap-2"><button onclick="editStore(${s.rowIdx})" class="text-indigo-600 p-2"><i class="fas fa-edit"></i></button><button onclick="deleteRow('Stores', ${s.rowIdx})" class="text-rose-500 p-2"><i class="fas fa-trash"></i></button></div></div>`).join('');
        }
        async function deleteRow(sheet, idx) {
            if (!confirm("Delete?")) return; showLoader(true, "Deleting...");
            try { const meta = await sheetsRequest('GET', '?fields=sheets.properties'); const id = meta.sheets.find(s => s.properties.title === sheet).properties.sheetId; await sheetsRequest('POST', ':batchUpdate', { requests: [{ deleteDimension: { range: { sheetId: id, dimension: "ROWS", startIndex: idx - 1, endIndex: idx } } }] }); await initializeData(); } catch (e) { alert(e.message); } finally { showLoader(false); }
        }
        async function checkDatabaseHealth() {
            const btn = document.getElementById('btn-repair-db'); const badge = document.getElementById('db-status-badge');
            try {
                const meta = await sheetsRequest('GET', '?fields=sheets.properties.title'); const existing = meta.sheets.map(s => s.properties.title);
                const needsRepair = ['Stores', 'Employees', 'Attendance', 'Settings'].some(r => !existing.includes(r));
                if (needsRepair) { badge.innerText = "DB: REPAIR NEEDED"; badge.className = "inline-block px-4 py-1 rounded-full text-[9px] font-black mb-6 bg-rose-100 text-rose-600 shadow-sm"; btn.disabled = false; btn.className = "w-full bg-rose-600 text-white p-6 rounded-3xl font-black"; }
                else { badge.innerText = "DB: CONNECTED"; badge.className = "inline-block px-4 py-1 rounded-full text-[9px] font-black mb-6 bg-emerald-100 text-emerald-600 shadow-sm"; btn.disabled = true; }
            } catch (e) { badge.innerText = "OFFLINE"; }
        }
        function editStore(idx) { const s = appState.stores.find(st => st.rowIdx === idx); document.getElementById('store-name').value = s.name; document.getElementById('store-lat').value = s.lat; document.getElementById('store-lng').value = s.lng; document.getElementById('store-range').value = s.range; document.getElementById('store-row-idx').value = s.rowIdx; document.getElementById('store-form-title').innerText = "Update Store"; document.getElementById('store-cancel-btn').classList.remove('hidden'); window.scrollTo(0,0); }
        function editStaff(idx) { const s = appState.staff.find(st => st.rowIdx === idx); document.getElementById('emp-email').value = s.email; document.getElementById('emp-name').value = s.name; document.getElementById('emp-store-select').value = s.store; document.getElementById('staff-row-idx').value = s.rowIdx; document.getElementById('staff-form-title').innerText = "Update Staff"; document.getElementById('staff-cancel-btn').classList.remove('hidden'); window.scrollTo(0,0); }
        function resetStoreForm() { document.getElementById('form-store').reset(); document.getElementById('store-row-idx').value = ""; document.getElementById('store-form-title').innerText = "Add Store"; document.getElementById('store-cancel-btn').classList.add('hidden'); }
        function resetStaffForm() { document.getElementById('form-employee').reset(); document.getElementById('staff-row-idx').value = ""; document.getElementById('staff-form-title').innerText = "Register Staff Member"; document.getElementById('staff-cancel-btn').classList.add('hidden'); }
        document.getElementById('form-store').onsubmit = async (e) => { e.preventDefault(); showLoader(true, "Updating Store..."); const row = [Date.now(), document.getElementById('store-name').value, document.getElementById('store-lat').value, document.getElementById('store-lng').value, document.getElementById('store-range').value]; const idx = document.getElementById('store-row-idx').value; if (idx) await sheetsRequest('PUT', `/values/Stores!A${idx}:E${idx}?valueInputOption=USER_ENTERED`, { values: [row] }); else await sheetsRequest('POST', '/values/Stores!A:A:append?valueInputOption=USER_ENTERED', { values: [row] }); resetStoreForm(); await initializeData(); showLoader(false); };
        document.getElementById('form-employee').onsubmit = async (e) => { e.preventDefault(); showLoader(true, "Updating Staff..."); const row = [document.getElementById('emp-email').value, document.getElementById('emp-name').value, document.getElementById('emp-store-select').value, 'Active']; const idx = document.getElementById('staff-row-idx').value; if (idx) await sheetsRequest('PUT', `/values/Employees!A${idx}:D${idx}?valueInputOption=USER_ENTERED`, { values: [row] }); else await sheetsRequest('POST', '/values/Employees!A:A:append?valueInputOption=USER_ENTERED', { values: [row] }); resetStaffForm(); await initializeData(); showLoader(false); };
    </script>
</body>
</html>
