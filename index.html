<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro-Attend | Enterprise Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .loading-overlay { display: none; background: rgba(255,255,255,0.98); z-index: 9999; position: fixed; inset: 0; }
        .loading-overlay.active { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #video-preview, #captured-photo { transform: scaleX(-1); border-radius: 1.5rem; border: 4px solid white; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .toast { transition: all 0.4s ease; transform: translate(-50%, 150%); left: 50%; bottom: 2rem; position: fixed; z-index: 1000; }
        .toast.active { transform: translate(-50%, 0); }
        .tab-btn.active { border-bottom: 3px solid #4338ca; color: #4338ca; }
        .locked-screen { display: none; position: fixed; inset: 0; background: white; z-index: 10000; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2rem; }
        canvas { display: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">

    <!-- Unregistered User Popup (Lockout) -->
    <div id="lockout-screen" class="locked-screen">
        <div class="w-20 h-20 bg-rose-100 text-rose-600 rounded-full flex items-center justify-center mb-6">
            <i class="fas fa-user-lock text-3xl"></i>
        </div>
        <h2 class="text-xl font-black text-slate-800 mb-2">Access Denied</h2>
        <p class="text-slate-500 text-sm max-w-xs mb-8">You are not a registered user. Contact your store manager.</p>
        <button onclick="logout()" class="bg-slate-900 text-white px-8 py-3 rounded-2xl font-bold">Try Another Account</button>
    </div>

    <!-- Global Loader -->
    <div id="loader" class="loading-overlay">
        <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-indigo-700 mb-4"></div>
        <p id="loader-msg" class="font-bold text-indigo-700 uppercase tracking-tighter text-[10px]">Processing...</p>
    </div>

    <!-- Header -->
    <header class="bg-indigo-700 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 onclick="goHome()" class="text-xl font-black tracking-tighter italic cursor-pointer select-none">PRO-ATTEND</h1>
            <div class="flex gap-2">
                <button id="admin-toggle-btn" onclick="enterAdminMode()" class="hidden bg-white/20 px-4 py-2 rounded-xl text-xs font-bold hover:bg-white/30 transition">ADMIN</button>
                <button id="logout-btn" onclick="logout()" class="hidden bg-rose-600 px-4 py-2 rounded-xl text-xs font-bold">LOGOUT</button>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4">
        
        <!-- VIEW: LOGIN -->
        <section id="view-auth" class="mt-20 text-center">
            <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl max-w-sm mx-auto border border-slate-100">
                <i class="fas fa-shield-halved text-4xl text-indigo-600 mb-6"></i>
                <h2 class="text-2xl font-black text-slate-800 mb-2">Secure Login</h2>
                <button onclick="login()" class="w-full bg-slate-900 text-white p-4 rounded-2xl flex items-center justify-center gap-3 font-bold mt-6">
                    <img src="https://www.gstatic.com/images/branding/product/1x/g_logo_500px_clr.png" class="w-5"> Login with Google
                </button>
            </div>
        </section>

        <!-- VIEW: ATTENDANCE (HOME) -->
        <section id="view-attendance" class="hidden space-y-6">
            <div class="bg-white p-6 rounded-3xl shadow-lg border-l-8 border-indigo-600">
                <h2 id="shift-status" class="text-2xl font-black text-slate-800 tracking-tight">System Ready</h2>
                <p id="user-display-name" class="text-slate-400 text-sm font-medium mt-1">Verifying...</p>
            </div>

            <div class="bg-white p-8 rounded-[2.5rem] shadow-xl space-y-6 text-center">
                <div class="relative overflow-hidden bg-slate-100 rounded-3xl aspect-square max-w-[300px] mx-auto border-4 border-white shadow-inner">
                    <video id="video-preview" autoplay playsinline class="w-full h-full object-cover hidden"></video>
                    <img id="captured-photo" class="w-full h-full object-cover hidden" />
                    <div id="camera-placeholder" class="absolute inset-0 flex items-center justify-center text-slate-300">
                        <i class="fas fa-camera text-5xl opacity-20"></i>
                    </div>
                    <div class="absolute bottom-6 left-0 right-0 flex justify-center gap-3">
                        <button onclick="startCamera()" id="start-camera-btn" class="bg-indigo-600 text-white px-6 py-3 rounded-2xl text-xs font-black shadow-xl">START CAMERA</button>
                        <button onclick="capturePhoto()" id="capture-btn" class="hidden bg-emerald-500 text-white px-6 py-3 rounded-2xl text-xs font-black shadow-xl">CAPTURE</button>
                    </div>
                </div>

                <div id="location-card" class="bg-slate-50 p-4 rounded-2xl text-[10px] font-black text-slate-400 uppercase tracking-widest border-2 border-dashed border-slate-200">
                    <span id="location-status">Waiting for GPS...</span>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <button id="btn-punch-in" disabled onclick="handlePunch('IN')" class="bg-emerald-500 disabled:bg-slate-200 text-white py-6 rounded-3xl font-black text-xl shadow-lg transition-all">PUNCH IN</button>
                    <button id="btn-punch-out" disabled onclick="handlePunch('OUT')" class="bg-rose-600 disabled:bg-slate-200 text-white py-6 rounded-3xl font-black text-xl shadow-lg transition-all">PUNCH OUT</button>
                </div>
            </div>
        </section>

        <!-- VIEW: ADMIN PANEL -->
        <section id="view-admin" class="hidden space-y-6 pb-20">
            <div class="flex border-b border-slate-200 overflow-x-auto gap-2 no-scrollbar">
                <button onclick="setAdminTab('dash')" class="tab-btn px-4 py-3 font-bold text-xs active" id="tab-dash">DASHBOARD</button>
                <button onclick="setAdminTab('stores')" class="tab-btn px-4 py-3 font-bold text-xs" id="tab-stores">STORES</button>
                <button onclick="setAdminTab('staff')" class="tab-btn px-4 py-3 font-bold text-xs" id="tab-staff">STAFF</button>
                <button onclick="setAdminTab('setup')" class="tab-btn px-4 py-3 font-bold text-xs" id="tab-setup">SETUP</button>
            </div>

            <!-- DASHBOARD TAB -->
            <div id="admin-dash" class="space-y-6">
                <div class="bg-white p-6 rounded-3xl shadow-md border border-slate-100 space-y-4">
                    <h3 class="font-black text-sm uppercase text-indigo-700">Attendance Reports</h3>
                    <div class="grid grid-cols-2 gap-3">
                        <input type="date" id="filter-start" class="border p-2 rounded-xl text-xs">
                        <input type="date" id="filter-end" class="border p-2 rounded-xl text-xs">
                        <select id="filter-store" class="col-span-2 border p-3 rounded-xl text-sm font-bold bg-slate-50"><option value="">All Stores</option></select>
                        <button onclick="loadDashboardReport()" class="col-span-2 bg-indigo-600 text-white p-3 rounded-xl font-bold text-sm">Generate Data</button>
                    </div>
                </div>
                <div id="report-results" class="space-y-4"></div>
            </div>

            <!-- STAFF TAB -->
            <div id="admin-staff" class="hidden space-y-4">
                <div class="bg-white p-6 rounded-3xl shadow-md space-y-3">
                    <h3 class="font-black text-xs uppercase text-slate-400">Filter Staff List</h3>
                    <select id="manage-staff-filter" onchange="renderStaffList()" class="w-full border p-4 rounded-2xl bg-white font-bold outline-none shadow-sm"><option value="all">All Staff Members</option></select>
                </div>
                <form id="form-employee" class="bg-white p-6 rounded-3xl shadow-md space-y-3">
                    <input type="email" id="emp-email" placeholder="Email" class="w-full border p-3 rounded-xl" required>
                    <input type="text" id="emp-name" placeholder="Full Name" class="w-full border p-3 rounded-xl" required>
                    <select id="emp-store-select" class="w-full border p-3 rounded-xl" required></select>
                    <button type="submit" class="w-full bg-emerald-600 text-white p-3 rounded-xl font-bold">Register Staff</button>
                </form>
                <div id="staff-list" class="space-y-2"></div>
            </div>

            <!-- STORES TAB -->
            <div id="admin-stores" class="hidden space-y-4">
                <form id="form-store" class="bg-white p-6 rounded-3xl shadow-md space-y-3">
                    <input type="text" id="store-name" placeholder="Name" class="w-full border p-3 rounded-xl" required>
                    <div class="flex gap-2"><input type="text" id="store-lat" placeholder="Lat" class="w-1/2 border p-3 rounded-xl"><input type="text" id="store-lng" placeholder="Lng" class="w-1/2 border p-3 rounded-xl"></div>
                    <button type="submit" class="w-full bg-slate-900 text-white p-3 rounded-xl font-bold">Add Store</button>
                </form>
                <div id="stores-list" class="space-y-2"></div>
            </div>

            <!-- SETUP TAB -->
            <div id="admin-setup" class="hidden space-y-6">
                <div class="bg-white p-8 rounded-3xl shadow-xl text-center border border-slate-100">
                    <h3 class="font-black text-slate-800 text-xl mb-2">DB Management</h3>
                    <div id="db-status-badge" class="inline-block px-4 py-1 rounded-full text-[10px] font-black mb-6 bg-slate-100">Syncing Health...</div>
                    <button id="btn-repair-db" disabled onclick="adminSyncDatabase()" class="w-full bg-slate-100 text-slate-400 p-5 rounded-2xl font-black shadow-md">REPAIR DB STRUCTURE</button>
                    
                    <div class="mt-8 p-6 bg-slate-50 rounded-3xl text-left border border-slate-200">
                        <div class="flex items-center justify-between mb-4">
                            <span class="text-sm font-bold">PIN Security</span>
                            <input type="checkbox" id="pin-toggle" onchange="updateSecuritySettings()" class="w-6 h-6">
                        </div>
                        <input type="password" id="admin-pin-code" maxlength="4" placeholder="4-Digit PIN" class="w-full border p-4 rounded-2xl text-center font-black text-xl tracking-[1em] outline-none">
                        <button onclick="updateSecuritySettings()" class="w-full mt-4 bg-indigo-600 text-white p-4 rounded-2xl font-black text-xs">Save PIN Settings</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="toast" class="toast bg-slate-900 text-white px-8 py-5 rounded-[2rem] shadow-2xl flex flex-col min-w-[320px]"><span id="toast-title" class="text-[10px] font-black uppercase text-indigo-400 tracking-tighter">System</span><span id="toast-msg" class="text-sm font-bold mt-1"></span></div>

    <canvas id="photo-canvas" width="300" height="300"></canvas>

    <script>
        /** 1. CORE CONFIGURATION */
        const CONFIG = {
            CLIENT_ID : '747138722746-5moie20nkh3hgpkrhfb4gmvmkiadjbku.apps.googleusercontent.com',
            API_KEY : 'AIzaSyA3v6zEyQhRq8X-PW0HG1eqhdmk8wbSg8s',
            SPREADSHEET_ID : '1UpHxRuvfYWguE78__bYR2sfjxRn6sskqOa5Po7XUoCU',
            OWNER_EMAIL : 'krishnahospitalsapotra@gmail.com',
            GEOFENCE_RADIUS_M: 150
        };

        let appState = {
            token: localStorage.getItem('access_token'),
            user: JSON.parse(localStorage.getItem('user_info')),
            stores: [], staff: [],
            settings: { pin: '0000', pinEnabled: false },
            photoBase64: null, curLat: null, curLng: null
        };

        /** 2. AUTHENTICATION & LOCKOUT */
        window.onload = () => { if(appState.token) handleAuthSuccess(); initGIS(); };
        
        let tokenClient;
        function initGIS() {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CONFIG.CLIENT_ID,
                scope: 'https://www.googleapis.com/auth/spreadsheets',
                callback: (resp) => {
                    appState.token = resp.access_token;
                    localStorage.setItem('access_token', resp.access_token);
                    handleAuthSuccess();
                }
            });
        }

        async function handleAuthSuccess() {
            showLoader(true, "Authenticating...");
            try {
                const res = await fetch(`https://www.googleapis.com/oauth2/v3/userinfo`, { headers: { Authorization: `Bearer ${appState.token}` } });
                if (!res.ok) throw new Error("OAuth Expired");
                appState.user = await res.json();
                localStorage.setItem('user_info', JSON.stringify(appState.user));

                document.getElementById('user-display-name').innerText = appState.user.name || appState.user.email;
                document.getElementById('logout-btn').classList.remove('hidden');

                if (appState.user.email.toLowerCase() === CONFIG.OWNER_EMAIL.toLowerCase()) {
                    document.getElementById('admin-toggle-btn').classList.remove('hidden');
                }

                toggleView('attendance');
                await initializeData();
                startGeofencing();
            } catch (e) { logout(); } finally { showLoader(false); }
        }

        async function initializeData() {
            try {
                const [sRes, eRes, setRes] = await Promise.all([
                    sheetsRequest('GET', '/values/Stores!A2:D').catch(() => ({})),
                    sheetsRequest('GET', '/values/Employees!A2:D').catch(() => ({})),
                    sheetsRequest('GET', '/values/Settings!A1:B2').catch(() => ({}))
                ]);

                appState.stores = (sRes.values || []).map((r, i) => ({ id: r[0], name: r[1], lat: r[2], lng: r[3], rowIdx: i + 2 }));
                appState.staff = (eRes.values || []).map((r, i) => ({ email: r[0], name: r[1], store: r[2], rowIdx: i + 2 }));
                if (setRes.values) {
                    appState.settings.pinEnabled = setRes.values[0][1] === 'true';
                    appState.settings.pin = setRes.values[1][1];
                }

                // SECURE USER CHECK
                if (appState.user.email.toLowerCase() !== CONFIG.OWNER_EMAIL.toLowerCase()) {
                    const exists = appState.staff.some(s => s.email.toLowerCase() === appState.user.email.toLowerCase());
                    if (!exists) return document.getElementById('lockout-screen').style.display = 'flex';
                }

                const options = appState.stores.map(s => `<option value="${s.name}">${s.name}</option>`).join('');
                document.getElementById('manage-staff-filter').innerHTML = `<option value="all">All Staff Members</option>` + options;
                document.getElementById('emp-store-select').innerHTML = `<option value="">Select Store</option>` + options;
                document.getElementById('filter-store').innerHTML = `<option value="">All Stores</option>` + options;
                
                await checkShiftStatus();
                renderStaffList();
                renderStoresList();
                checkDatabaseHealth();
            } catch (e) { checkDatabaseHealth(); }
        }

        /** 3. ADMIN DASHBOARD & REPORTS */
        async function loadDashboardReport() {
            showLoader(true, "Generating Report...");
            const start = document.getElementById('filter-start').value;
            const end = document.getElementById('filter-end').value;
            const store = document.getElementById('filter-store').value;
            const results = document.getElementById('report-results');

            try {
                const res = await sheetsRequest('GET', '/values/Attendance!A2:G');
                let logs = (res.values || []).map(r => ({ ts: r[0], date: r[1], email: r[2], action: r[3] }));
                
                if (start) logs = logs.filter(l => l.date >= start);
                if (end) logs = logs.filter(l => l.date <= end);
                if (store) {
                    const storeEmails = appState.staff.filter(s => s.store === store).map(s => s.email.toLowerCase());
                    logs = logs.filter(l => storeEmails.includes(l.email.toLowerCase()));
                }

                results.innerHTML = `
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-indigo-700 text-white p-4 rounded-2xl text-center"><p class="text-[8px] font-bold opacity-70 uppercase">Total Hits</p><p class="text-xl font-black">${logs.length}</p></div>
                        <div class="bg-slate-900 text-white p-4 rounded-2xl text-center"><p class="text-[8px] font-bold opacity-70 uppercase">Active Staff</p><p class="text-xl font-black">${new Set(logs.map(l=>l.email)).size}</p></div>
                    </div>
                ` + logs.slice().reverse().map(l => `
                    <div class="bg-white p-4 rounded-2xl border border-slate-100 flex justify-between items-center shadow-sm">
                        <div class="text-xs font-bold">${l.email.split('@')[0].toUpperCase()}<p class="text-[9px] text-slate-400 font-normal">${l.date} @ ${l.ts.split(', ')[1]}</p></div>
                        <span class="px-2 py-1 rounded-full text-[9px] font-black ${l.action === 'IN' ? 'bg-emerald-100 text-emerald-600' : 'bg-rose-100 text-rose-600'}">${l.action}</span>
                    </div>
                `).join('');
            } catch (e) { alert("Failed to fetch reports"); }
            finally { showLoader(false); }
        }

        /** 4. DATABASE UTILS */
        async function checkDatabaseHealth() {
            const btn = document.getElementById('btn-repair-db');
            const badge = document.getElementById('db-status-badge');
            try {
                const meta = await sheetsRequest('GET', '?fields=sheets.properties.title');
                const existing = meta.sheets.map(s => s.properties.title);
                const required = ['Stores', 'Employees', 'Attendance', 'Settings'];
                const needsRepair = required.some(r => !existing.includes(r));
                
                if (needsRepair) {
                    badge.innerText = "STRUCTURE UPDATE REQUIRED";
                    badge.className = "inline-block px-4 py-1 rounded-full text-[9px] font-black mb-6 bg-rose-100 text-rose-600";
                    btn.disabled = false;
                    btn.className = "w-full bg-rose-600 text-white p-5 rounded-2xl font-black shadow-lg";
                } else {
                    badge.innerText = "SYSTEM HEALTHY";
                    badge.className = "inline-block px-4 py-1 rounded-full text-[9px] font-black mb-6 bg-emerald-100 text-emerald-600";
                    btn.disabled = true;
                }
            } catch (e) { badge.innerText = "DB CONNECTION ERROR"; }
        }

        async function adminSyncDatabase() {
            showLoader(true, "Repairing Tabs...");
            try {
                const meta = await sheetsRequest('GET', '?fields=sheets.properties.title');
                const existing = meta.sheets.map(s => s.properties.title);
                const schema = [
                    { name: 'Stores', h: ['ID', 'Name', 'Lat', 'Lng'] },
                    { name: 'Employees', h: ['Email', 'Name', 'StoreName', 'Status'] },
                    { name: 'Attendance', h: ['Timestamp', 'Date', 'Email', 'Action', 'Photo', 'GPS', 'Device'] },
                    { name: 'Settings', h: ['Key', 'Value'] }
                ];
                for (const sheet of schema) {
                    if (!existing.includes(sheet.name)) {
                        await sheetsRequest('POST', ':batchUpdate', { requests: [{ addSheet: { properties: { title: sheet.name } } }] });
                        await sheetsRequest('PUT', `/values/${sheet.name}!A1:G1?valueInputOption=RAW`, { values: [sheet.h] });
                    }
                }
                showToast("DB Updated");
                initializeData();
            } catch (e) { alert(e.message); } finally { showLoader(false); }
        }

        /** 5. ATTENDANCE ACTIONS */
        async function startCamera() {
            const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
            const v = document.getElementById('video-preview');
            v.srcObject = s; v.classList.remove('hidden');
            document.getElementById('camera-placeholder').classList.add('hidden');
            document.getElementById('start-camera-btn').classList.add('hidden');
            document.getElementById('capture-btn').classList.remove('hidden');
        }

        function capturePhoto() {
            const v = document.getElementById('video-preview');
            const c = document.getElementById('photo-canvas');
            c.getContext('2d').drawImage(v, 0, 0, 300, 300);
            appState.photoBase64 = c.toDataURL('image/jpeg', 0.6);
            document.getElementById('captured-photo').src = appState.photoBase64;
            document.getElementById('captured-photo').classList.remove('hidden');
            v.classList.add('hidden'); document.getElementById('capture-btn').classList.add('hidden');
            v.srcObject.getTracks().forEach(t => t.stop());
            validatePunch();
        }

        function startGeofencing() {
            navigator.geolocation.watchPosition(pos => {
                appState.curLat = pos.coords.latitude;
                appState.curLng = pos.coords.longitude;
                document.getElementById('location-status').innerText = "LOCATION SECURED";
                validatePunch();
            }, null, { enableHighAccuracy: true });
        }

        function validatePunch() {
            if(appState.curLat && appState.photoBase64) {
                document.getElementById('btn-punch-in').disabled = false;
                document.getElementById('btn-punch-out').disabled = false;
            }
        }

        async function handlePunch(a) {
            showLoader(true, "Punching...");
            try {
                const row = [new Date().toLocaleString(), new Date().toISOString().split('T')[0], appState.user.email, a, appState.photoBase64, `${appState.curLat},${appState.curLng}`, "CLIENT-X"];
                await sheetsRequest('POST', '/values/Attendance!A:A:append?valueInputOption=USER_ENTERED', { values: [row] });
                location.reload();
            } catch (e) { alert("Punch Failed"); showLoader(false); }
        }

        /** 6. NAVIGATION & UI */
        function goHome() { toggleView('attendance'); }
        function login() { tokenClient.requestAccessToken(); }
        function logout() { localStorage.clear(); location.reload(); }
        function showLoader(s, m) { document.getElementById('loader-msg').innerText = m; document.getElementById('loader').classList.toggle('active', s); }
        function toggleView(v) { ['auth', 'attendance', 'admin'].forEach(x => document.getElementById(`view-${x}`).classList.add('hidden')); document.getElementById(`view-${v}`).classList.remove('hidden'); }
        function setAdminTab(t) { document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); document.getElementById('tab-'+t).classList.add('active'); ['dash', 'stores', 'staff', 'setup'].forEach(x => document.getElementById('admin-'+x).classList.add('hidden')); document.getElementById('admin-'+t).classList.remove('hidden'); if(t==='dash') loadDashboardReport(); }
        
        async function enterAdminMode() { 
            if (appState.settings.pinEnabled) {
                if (prompt("Enter 4-Digit Admin PIN:") === appState.settings.pin) setAdminTab('dash'), toggleView('admin');
                else alert("Unauthorized PIN");
            } else { setAdminTab('dash'), toggleView('admin'); }
        }

        /** 7. FORMS & DATA RENDER */
        async function sheetsRequest(method, path, body = null) {
            const url = `https://sheets.googleapis.com/v4/spreadsheets/${CONFIG.SPREADSHEET_ID}${path}`;
            const res = await fetch(url, { method, headers: { 'Authorization': `Bearer ${appState.token}`, 'Content-Type': 'application/json' }, body: body ? JSON.stringify(body) : null });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error?.message || "API Error");
            return data;
        }

        function renderStaffList() {
            const filter = document.getElementById('manage-staff-filter').value;
            const data = filter === 'all' ? appState.staff : appState.staff.filter(s => s.store === filter);
            document.getElementById('staff-list').innerHTML = data.map(s => `
                <div class="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm border border-slate-100">
                    <div class="text-xs font-bold">${s.name}<p class="text-slate-400 font-normal">${s.email} • ${s.store}</p></div>
                    <button onclick="deleteRow('Employees', ${s.rowIdx})" class="text-rose-500 p-2"><i class="fas fa-trash"></i></button>
                </div>
            `).join('');
        }

        function renderStoresList() {
            document.getElementById('stores-list').innerHTML = appState.stores.map(s => `
                <div class="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm border border-slate-100">
                    <div class="text-xs font-bold">${s.name}<p class="text-slate-400 font-normal">${s.lat}, ${s.lng}</p></div>
                    <button onclick="deleteRow('Stores', ${s.rowIdx})" class="text-rose-500 p-2"><i class="fas fa-trash"></i></button>
                </div>
            `).join('');
        }

        document.getElementById('form-store').onsubmit = async (e) => { e.preventDefault(); showLoader(true); await sheetsRequest('POST', '/values/Stores!A:A:append?valueInputOption=USER_ENTERED', { values: [[Date.now(), document.getElementById('store-name').value, document.getElementById('store-lat').value, document.getElementById('store-lng').value]] }); e.target.reset(); await initializeData(); showLoader(false); };
        document.getElementById('form-employee').onsubmit = async (e) => { e.preventDefault(); showLoader(true); await sheetsRequest('POST', '/values/Employees!A:A:append?valueInputOption=USER_ENTERED', { values: [[document.getElementById('emp-email').value, document.getElementById('emp-name').value, document.getElementById('emp-store-select').value, 'Active']] }); e.target.reset(); await initializeData(); showLoader(false); };

        async function updateSecuritySettings() {
            showLoader(true, "Updating Security...");
            const pin = document.getElementById('admin-pin-code').value;
            const enabled = document.getElementById('pin-toggle').checked;
            try {
                await sheetsRequest('PUT', '/values/Settings!A1:B2?valueInputOption=RAW', { values: [['PIN_ENABLED', enabled], ['ADMIN_PIN', pin]] });
                appState.settings = { pin, pinEnabled: enabled };
                alert("Security Saved");
            } catch (e) { alert(e.message); }
            finally { showLoader(false); }
        }

        async function deleteRow(sheet, idx) {
            if (!confirm("Delete forever?")) return;
            showLoader(true, "Deleting...");
            try {
                const meta = await sheetsRequest('GET', '?fields=sheets.properties');
                const id = meta.sheets.find(s => s.properties.title === sheet).properties.sheetId;
                await sheetsRequest('POST', ':batchUpdate', { requests: [{ deleteDimension: { range: { sheetId: id, dimension: "ROWS", startIndex: idx - 1, endIndex: idx } } }] });
                await initializeData();
            } catch (e) { alert(e.message); } finally { showLoader(false); }
        }
    </script>
</body>
</html>
